name: CLI Smoke Test

on:
  push:
    branches: [main]
  pull_request:
    # The tarball under test bundles apps/server and apps/client (esbuild), so
    # they gate PRs alongside the CLI package itself.
    paths:
      - 'packages/cli/**'
      - 'packages/shared/**'
      - 'apps/server/**'
      - 'apps/client/**'
      - 'Dockerfile'
      - '.dockerignore'
      - 'scripts/smoke-test.sh'
      - 'pnpm-lock.yaml'
      - '.github/workflows/cli-smoke-test.yml'
  workflow_dispatch:

# Cancel superseded runs on the same ref for PRs only — every push to main
# keeps its own completed run.
concurrency:
  group: cli-smoke-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Opt into Node 24 for every JavaScript-based action (checkout, setup-node,
# upload-artifact, download-artifact, etc.) ahead of GitHub's Sept 2026 hard
# cutoff for Node 20 runtime. See the deprecation notice at
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-tarball:
    runs-on: ubuntu-latest
    # Baseline ~1.5-2 minutes on a warm turbo/pnpm cache; generous headroom
    # for a cold-cache run.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build CLI
        run: pnpm --filter=dorkos run build

      - name: Pack tarball
        run: |
          cd packages/cli
          pnpm pack --pack-destination $GITHUB_WORKSPACE/artifacts
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}

      - uses: actions/upload-artifact@v4
        with:
          name: cli-tarball
          path: artifacts/dorkos-*.tgz
          retention-days: 1

  smoke-test-bare:
    needs: build-tarball
    runs-on: ubuntu-latest
    # Baseline ~40-70 seconds per matrix leg.
    timeout-minutes: 10
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y python3 build-essential

      - uses: actions/download-artifact@v4
        with:
          name: cli-tarball

      - name: Mock Claude CLI
        run: |
          printf '#!/bin/sh\necho "claude mock 1.0.0"\n' | sudo tee /usr/local/bin/claude
          sudo chmod +x /usr/local/bin/claude

      - name: Install dorkos from tarball
        run: npm install -g dorkos-*.tgz

      - name: Verify install
        run: |
          set -e
          echo "=== which dorkos ==="
          which dorkos
          echo "=== dorkos --version ==="
          dorkos --version
          echo "=== dorkos --help ==="
          dorkos --help
          echo "=== dorkos --post-install-check ==="
          dorkos --post-install-check
          echo "=== dorkos init --yes ==="
          dorkos init --yes
          echo ""
          echo "All smoke tests passed"

  smoke-test-docker:
    needs: build-tarball
    runs-on: ubuntu-latest
    # Baseline ~1-1.5 minutes.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            Dockerfile
            .dockerignore

      - uses: actions/download-artifact@v4
        with:
          name: cli-tarball

      - name: Build smoke test image
        run: docker build --target smoke -t dorkos-smoke .

      - name: Run smoke tests
        run: docker run --rm dorkos-smoke

  integration-test:
    needs: build-tarball
    runs-on: ubuntu-latest
    # Baseline ~1-1.2 minutes.
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            Dockerfile
            .dockerignore
            scripts/smoke-test.sh

      - uses: actions/download-artifact@v4
        with:
          name: cli-tarball

      - name: Build integration test image
        run: docker build --target integration -t dorkos-integration .

      - name: Run integration tests
        run: docker run --rm dorkos-integration
