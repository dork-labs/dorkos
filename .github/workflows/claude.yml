name: claude

# Interactive Claude in PRs and issues: mention @claude in a PR/issue comment, in
# a reply on an inline review-comment thread, or in a review body, and Claude
# responds in that thread and can push fixes when asked. This is the
# "back-and-forth" half of the setup; claude-code-review.yml is the auto-review
# half. Auth and the Terms-of-Service rationale match claude-code-review.yml.
#
# Public-repo safety: comment and review events run in the BASE repo context with
# secret access even for fork PRs, so the `if` restricts triggering to users with
# write access (OWNER / MEMBER / COLLABORATOR). Without this, any visitor could
# @claude and spend the maintainer's subscription quota.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude:
    # Trigger only when a write-access user writes "@claude". The comment.* and
    # review.* fields are mutually exclusive per event, so the empty side is
    # simply false.
    if: |
      (
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR' ||
        github.event.review.author_association == 'OWNER' ||
        github.event.review.author_association == 'MEMBER' ||
        github.event.review.author_association == 'COLLABORATOR'
      ) && (
        contains(github.event.comment.body, '@claude') ||
        contains(github.event.review.body, '@claude')
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Bumped from 20: review/fix requests are often multi-step (read diff,
          # grep references, edit, verify). A nudge to apply house conventions so
          # @claude fixes match the codebase.
          claude_args: |
            --max-turns 30
            --append-system-prompt "When reviewing or fixing code in this repo, apply the conventions in REVIEW.md and AGENTS.md at the repository root."
