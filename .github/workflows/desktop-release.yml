name: Desktop Release

on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (build but do not publish)'
        type: boolean
        default: false

# Opt into Node 24 for every JavaScript-based action (checkout, setup-node,
# upload-artifact, action-gh-release, etc.) ahead of GitHub's Sept 2026 hard
# cutoff for Node 20 runtime. See
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build desktop app
        run: pnpm --filter @dorkos/desktop build

      # Flips better-sqlite3/node-pty to Electron's ABI right before
      # packaging (electron-builder.yml has npmRebuild: false — see
      # scripts/rebuild-natives.ts for why its built-in rebuild is bypassed).
      # Deliberately NOT part of `pnpm build`: on a dev machine that flip
      # poisons the shared pnpm store for plain-Node vitest monorepo-wide.
      - name: Rebuild native modules for Electron
        run: pnpm --filter @dorkos/desktop exec tsx scripts/rebuild-natives.ts

      - name: Package DMG (unsigned)
        if: ${{ !vars.APPLE_DEVELOPER_CONFIGURED }}
        run: |
          cd apps/desktop
          CSC_IDENTITY_AUTO_DISCOVERY=false npx electron-builder --mac --arm64 --config electron-builder.yml --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package DMG (signed + notarized)
        if: ${{ vars.APPLE_DEVELOPER_CONFIGURED == 'true' }}
        run: |
          cd apps/desktop
          npx electron-builder --mac --arm64 --config electron-builder.yml --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: DorkOS-macOS-arm64
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip

      # The .zip must ship alongside the .dmg: latest-mac.yml points
      # electron-updater (Squirrel.Mac) at the zip as the update payload, so
      # a release without it 404s every auto-update check. The dmg is only
      # the human-facing installer.
      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/') && !inputs.dry_run
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
            apps/desktop/release/latest-mac.yml
          draft: true
          generate_release_notes: true
