name: cc-schema-sync

# Weekly drift monitor for the Claude Code marketplace schema that DorkOS's
# `cc-validator.ts` mirrors. See ADR-0238 and `scripts/sync-cc-schema.ts`.

on:
  schedule:
    - cron: '0 10 * * 1' # Mondays at 10:00 UTC
  workflow_dispatch:

# Opt into Node 24 for every JavaScript-based action (checkout, setup-node,
# pnpm/action-setup) ahead of GitHub's Sept 2026 hard cutoff for Node 20
# runtime. See
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run sync-cc-schema
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm tsx scripts/sync-cc-schema.ts
