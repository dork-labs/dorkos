pre-commit:
  commands:
    format:
      glob: '*.{ts,tsx,js,jsx,mjs,json,css,md,mdx,yml,yaml}'
      run: pnpm exec prettier --write {staged_files}
      stage_fixed: true
    db-migrations:
      glob: 'packages/db/src/schema/*.ts'
      run: |
        cd packages/db && npx drizzle-kit generate && cd ../..
        git add packages/db/drizzle/
      fail_text: 'DB schema changed — migrations generated and staged. Review and re-commit.'
    dir-size:
      run: bash scripts/check-dir-size.sh
      fail_text: 'Directory has too many files — split into subdirectories.'
    lint:
      run: pnpm lint
      fail_text: 'Lint errors found — fix them before committing.'
    typecheck:
      run: pnpm typecheck
      fail_text: 'Type errors found — fix them before committing.'

pre-push:
  commands:
    tests:
      # DOR-121: make the pre-push test gate deterministic under load.
      #
      #   --concurrency=1  Turbo otherwise fans out ~10 package suites in
      #     parallel, and each `vitest run` spawns its own ~CPU-count worker pool
      #     — together oversubscribing the CPU (~9x on a 14-core box). Suites run
      #     one-at-a-time so they don't starve each other, while each keeps its
      #     own internal parallelism (full box, still fast).
      #
      #   --retry=2  Some integration tests wait on real wall-clock I/O (chokidar
      #     fs-watch, HTTP round-trips) and can still be starved by load this gate
      #     can't control — notably other agents running concurrently. A bounded
      #     retry lets a transient flake self-heal; a genuine failure fails all
      #     three attempts and still blocks the push. Gate-only on purpose: CI and
      #     a bare `vitest run` keep retry off so they still surface real flakiness.
      #
      # Determinism over raw speed here; turbo's test cache keeps everyday pushes
      # fast (only changed packages re-run).
      run: pnpm exec dotenv -- turbo test --concurrency=1 -- --run --retry=2
      fail_text: 'Tests failed — fix them before pushing.'
