<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <title>DorkOS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <script>
      (function () {
        var t = localStorage.getItem('gateway-theme');
        var dark =
          t === 'dark' || (t !== 'light' && matchMedia('(prefers-color-scheme: dark)').matches);
        if (dark) document.documentElement.classList.add('dark');
        // Desktop (Electron) shell detection, paint-safe: the preload script's
        // contextBridge runs before this inline script, so window.electronAPI
        // is already available here. Drives the `desktop-darwin` CSS variant
        // (drag region, traffic-light inset, selection defaults) before first
        // paint, avoiding a flash of un-adapted chrome.
        if (window.electronAPI && window.electronAPI.platform === 'darwin') {
          document.documentElement.classList.add('desktop-darwin');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
