appId: com.dorkos.desktop
productName: DorkOS
copyright: © 2026 DorkOS
directories:
  output: release
  buildResources: build

mac:
  category: public.app-category.developer-tools
  # zip must accompany dmg: electron-updater (Squirrel.Mac) can only install
  # updates from the zip artifact; the dmg is the human-facing installer.
  #
  # mac is arm64-only. The Claude Code binary ships as a per-arch optional
  # dependency (see apps/desktop/package.json's optionalDependencies). Every
  # packaged platform/arch needs BOTH its matching
  # `@anthropic-ai/claude-agent-sdk-<platform>-<arch>` package there AND an
  # asarUnpack glob for it below — otherwise the packaged app for that target
  # silently ships without a runnable Claude Code (the bug this config fixes).
  # Wired so far: darwin-arm64 (this block) and win32-x64 (the `win` block
  # below). Adding another target (mac x64, win32-arm64, linux) means repeating
  # both additions for it.
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  icon: build/icon.icns
  notarize: true
  # dorkos:// deep links (Chunk D). `protocols` is also valid at the
  # top level of this file (Configuration extends the same
  # PlatformSpecificBuildOptions mac does), but we're mac-only today, so
  # scoping it here keeps the mac-specific config together.
  protocols:
    name: DorkOS
    schemes:
      - dorkos
  # Electron's bundled Info.plist ships default usage-description strings
  # for capabilities this app never requests (camera, microphone,
  # Bluetooth, audio capture). electron-builder's extendInfo is
  # Object.assign'd onto the packaged Info.plist, and any resulting null
  # value is then deleted (app-builder-lib's macPackager.applyCommonInfo) —
  # so setting these to `null` cleanly strips them rather than shipping
  # unused privacy strings.
  extendInfo:
    NSCameraUsageDescription: null
    NSMicrophoneUsageDescription: null
    NSBluetoothAlwaysUsageDescription: null
    NSBluetoothPeripheralUsageDescription: null
    NSAudioCaptureUsageDescription: null

dmg:
  sign: true
  artifactName: DorkOS-${version}-${arch}.dmg

win:
  # x64 only for now (win32-arm64 is a tracked follow-up). Unsigned for the
  # alpha — no `certificateFile`/`azureSignOptions` here yet; adopting Azure
  # Artifact Signing is the business-gated follow-up (see
  # specs/desktop-windows-support). `dorkos://` deep links are registered at
  # runtime via app.setAsDefaultProtocolClient (cross-platform, see
  # src/main/index.ts), so no `protocols` block is needed here.
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64

nsis:
  # Per-user install (perMachine: false) so first run needs no admin/UAC
  # elevation — the right default for a developer tool a user installs for
  # themselves. oneClick: false shows the install wizard rather than a silent
  # one-click install, and lets the user pick the install directory.
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  artifactName: DorkOS-${version}-${arch}.exe

publish:
  provider: github
  owner: dork-labs
  repo: dorkos

asar: true
asarUnpack:
  - '**/node_modules/better-sqlite3/**'
  # node-pty backs the embedded terminal (services/terminal/); like
  # better-sqlite3 its .node binary must be a real file for dlopen.
  - '**/node_modules/node-pty/**'
  - '**/node_modules/@anthropic-ai/claude-agent-sdk/**'
  # The SDK ships the actual `claude` executable as a per-platform optional
  # dependency (@anthropic-ai/claude-agent-sdk-darwin-arm64). It must be a real
  # file on disk — a Mach-O binary cannot execute from inside app.asar — so
  # unpack it. server-process.ts hands the bundled server this unpacked path
  # via DORKOS_CLAUDE_CLI_PATH, because the server's own require.resolve can't
  # reach it (pnpm links the sibling only inside the SDK's store node_modules).
  # Keep this package version-locked to @anthropic-ai/claude-agent-sdk in
  # package.json (both 0.3.177) — a lone SDK bump would silently ship a skewed
  # or missing binary here.
  - '**/node_modules/@anthropic-ai/claude-agent-sdk-darwin-arm64/**'
  # Windows counterpart of the darwin-arm64 binary above: the SDK ships the
  # `claude.exe` executable as the win32-x64 optional dependency. A packaged
  # Windows app can't execute it from inside app.asar either, so unpack it —
  # server-process.ts resolves the per-platform path (…-win32-x64/claude.exe)
  # and hands it to the bundled server via DORKOS_CLAUDE_CLI_PATH.
  - '**/node_modules/@anthropic-ai/claude-agent-sdk-win32-x64/**'
  # express.static (app.ts's production SPA serving) cannot reliably read
  # range-requested static assets from inside app.asar — the packaged
  # window now loads the renderer via the bundled server's own
  # http://localhost:<port> (see window-manager.ts) rather than file://, so
  # these files must be real files on disk, not virtual asar entries.
  - 'dist/renderer/**'
  # ensureCoreExtensions's fs.cp() (staging bundled extensions into
  # DORK_HOME) can't read this source tree from inside app.asar either —
  # same class of read limitation as dist/renderer above.
  - 'core-extensions/**'

extraResources:
  - from: 'node_modules/better-sqlite3'
    to: 'node_modules/better-sqlite3'

# electron-builder's own automated native-module rebuild (the historical
# default for npmRebuild: true) was observed producing a better-sqlite3
# binary that reported a plausible size/hash yet still failed to `dlopen` at
# runtime with a misleading "wrong NODE_MODULE_VERSION" error — even with
# `buildDependenciesFromSource: true` forcing a from-source compile. A
# direct call to the same underlying `@electron/rebuild` CLI (not routed
# through electron-builder's wrapper) reliably produces a working binary —
# see scripts/rebuild-natives.ts, which the `pack`/`dist` scripts and the
# desktop-release workflow run immediately before electron-builder (NOT
# `pnpm build`, which must stay ABI-neutral for the rest of the monorepo).
# Disabled here so electron-builder packages that already-correct binary
# as-is instead of redoing (and re-breaking) the work.
npmRebuild: false
